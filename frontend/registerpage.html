 <!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>twin — вход</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      background:
        radial-gradient(900px 500px at 10% 10%, rgba(34, 211, 238, 0.18), transparent 40%),
        radial-gradient(700px 400px at 90% 90%, rgba(129, 140, 248, 0.18), transparent 40%),
        #020617;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f8fafc;
    }

    .auth-card {
      width: 420px;
      padding: 44px;
      border-radius: 28px;
      background: linear-gradient(
        180deg,
        rgba(15, 23, 42, 0.95),
        rgba(2, 6, 23, 0.95)
      );
      backdrop-filter: blur(22px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06),
        0 40px 120px rgba(0,0,0,0.85),
        0 0 90px rgba(34, 211, 238, 0.14);
      animation: fadeUp 0.8s ease forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .logo {
      font-size: 34px;
      font-weight: 900;
      margin-bottom: 6px;
      background: linear-gradient(90deg, #22d3ee, #818cf8);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      opacity: 0.75;
      font-size: 15px;
      margin-bottom: 30px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    .field label {
      font-size: 13px;
      color: #cbd5f5;
    }

    .field input {
      height: 46px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #020617;
      color: #f8fafc;
      font-size: 14px;
      outline: none;
      transition: border 0.2s ease, box-shadow 0.2s ease;
    }

    .field input::placeholder {
      color: #64748b;
    }

    .field input:focus {
      border-color: #22d3ee;
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.25);
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 26px;
    }

    .btn {
      flex: 1;
      height: 48px;
      border-radius: 16px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-login {
      background: linear-gradient(90deg, #22d3ee, #38bdf8);
      color: #020617;
      box-shadow: 0 0 30px rgba(34, 211, 238, 0.4);
    }

    .btn-register {
      background: transparent;
      color: #e5e7eb;
      border: 1px solid rgba(255,255,255,0.14);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .hint {
      margin-top: 22px;
      font-size: 13px;
      opacity: 0.55;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="auth-card">
    <div class="logo">twin</div>
    <div class="subtitle">Вход или регистрация</div>

    <div class="field">
      <label>Логин</label>
      <input type="text" id="email" placeholder="Введите логин" />
    </div>

    <div class="field">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="Введите пароль" />
    </div>

    <div class="actions">
      <button class="btn btn-login" onclick="login()">Войти</button>
      <button class="btn btn-register" onclick="register()">Регистрация</button>
    </div>
  </div>
  <script>
        const API_URL = "http://localhost:8000";

        async function register() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;


            const response = await fetch(`${API_URL}/auth/register`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            console.log(data);
            if (response.ok) {
                alert("Регистрация успешна! Теперь вы можете войти.");
            } else {
                alert("Ошибка регистрации: " + data.detail);
            }
        }
        async function login() {
            const username = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const formData = new URLSearchParams();
            formData.append("username", username);
            formData.append("password", password);

            const response = await fetch(`${API_URL}/auth/login-to-get-token`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: formData.toString()
            });

            const data = await response.json();
            console.log(data);
            //go to another page if response is successful and give token that was made
            if (response.ok) {
                localStorage.setItem("token", data.access_token);
                window.location.href = `main.html?token=${data.access_token}`;
            }
        }
  </script>
</body>
</html>
