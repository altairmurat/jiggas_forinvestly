<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>twin — Цена</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(900px 500px at 10% 10%, rgba(34,211,238,0.18), transparent 40%),
        radial-gradient(700px 400px at 90% 90%, rgba(129,140,248,0.18), transparent 40%),
        #020617;
      font-family: Inter, system-ui, sans-serif;
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .container {
      max-width: 1000px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(90deg, #22d3ee, #818cf8);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.7;
      margin-bottom: 50px;
    }

    .plans {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
    }

    .plan {
      background: linear-gradient(180deg, rgba(15,23,42,0.95), rgba(2,6,23,0.95));
      border-radius: 28px;
      padding: 32px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 30px 80px rgba(0,0,0,0.85);
      text-align: left;
    }

    .plan.pro {
      box-shadow:
        0 0 0 2px rgba(129,140,248,0.35),
        0 40px 120px rgba(0,0,0,0.9);
    }

    .plan-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .price {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 18px;
    }

    .features {
      list-style: none;
      padding: 0;
      margin: 0 0 28px 0;
      opacity: 0.85;
    }

    .features li {
      margin-bottom: 10px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border-radius: 999px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(90deg, #22d3ee, #818cf8);
      color: #020617;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.08);
      color: #f8fafc;
    }

    .back {
      margin-top: 40px;
      opacity: 0.6;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">twin</div>
    <h1>Простая и честная цена</h1>
    <div class="subtitle">
      Попробуй бесплатно — плати только если реально помогает
    </div>

    <div class="plans">
      <div class="plan">
        <div class="plan-title">Free</div>
        <div class="price">0₸</div>
        <ul class="features">
          <li>✔ 3 сообщения с ИИ</li>
          <li>✔ 1 загруженный чат</li>
          <li>✖ История чатов</li>
          <li>✖ Глубокий анализ</li>
        </ul>
        <button class="btn secondary" onclick="goBack()">Попробовать</button>
      </div>

      <div class="plan pro">
        <div class="plan-title">Pro</div>
        <div class="price">по токенам</div>
        <ul class="features">
          <li>✔ Без лимитов</li>
          <li>✔ История чатов</li>
          <li>✔ Глубокий анализ</li>
          <li>✔ Приоритет ИИ</li>
        </ul>
        <button class="btn">Купить токены</button>
      </div>
    </div>

    <div class="back" onclick="goBack()">← Вернуться назад</div>
  </div>

  <script>
    function goBack() {
      window.history.back();
    }
  </script>
</body>
</html>
